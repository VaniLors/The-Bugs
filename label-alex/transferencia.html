<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferencias</title>
</head>
<style>
*{
    margin: 0;
    padding: 0%;

}
body{
    margin: 0 20% 0 20%;
}
header{
    background-color: black;
    color: white;
}

main{
    background-color: rgb(76, 92, 185);
    color: white;
    display: flex;
    justify-content: center;
    height: 100px; 
    align-items: center;

}
div{
    margin: 1% 0 0 0;
}
.formulario{
    color: rgb(76, 92, 185);
}
.fila {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

label {
    width: 180px; 
    font-weight: bold;
}

input {
    flex: 1;
    padding: 5px;
}

.grupo {
    color: rgb(76, 92, 185);
    display: flex;
    flex: 1;
    width:  180px;
}

.grupo input{
    flex: 1;
    padding: 5px;

}

.grupo select {
    width: 30px; 
}

button{
    background-image: linear-gradient(to right, #0052D4, #4364F7, #6FB1FC);
    color: white; 
    padding: 5px 70px; 
}

.btn{
    display: flex;
    justify-content: end;
    gap: 20px;
    

}
</style>
<body>
    <header>
        <h3>TRANSFERENCIA</h3>
    </header>

    <main>
        <h1>TRANSFERENCIA</h1>
    </main>
    <div class="formulario">
        <div class="fila">
            <label>Unidad Actual</label>
            <input type="text" value="0252 - Nivel central">
        </div>
        
        <div class="fila">
            <label>Oficina Actual</label>
            <input type="text" value="100 DIRECCION">
        </div>

        <div class="fila">
            <label>Responsable Actual</label>
            <input type="text" value="DR WALTER AGREDA CO">
        </div>
        
        <div class="fila">
            <label>Nueva Unidad</label>
            <input type="text" value="Nivel central">
            <select>
                <option></option>
            </select>
        </div>
        <div class="fila">
        <label>Nueva Oficina</label>
        <input type="text">
        <select>
            <option></option>
        </select>
        </div>
        <div class="fila">
            <label>Nuevo Responsable</label>
            <input type="text">
            <select>
                <option></option>
            </select>
        </div>
        <div class="fila">
            <label>Auxilitar</label>
            <input type="text"> 
            <select>
                <option></option>
            </select>
        </div>

    </div> 
    <div class="btn">
        <button>Aceptar</button>
        <button>Cancelar</button>  
    </div>

    
</body>

</html>

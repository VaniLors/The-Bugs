<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración Unidad Administrativa</title>

<style>

body{
    background:#e9e9e9;
    font-family: Arial, Helvetica, sans-serif;
}

.contenedor{
    width:1100px;
    margin:30px auto;
    background:white;
    border:2px solid #bdbdbd;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

.top{
    background:linear-gradient(#0f3b6f,#3f88d3);
    color:white;
    padding:25px;
    font-size:50px;
    font-weight:bold;
    letter-spacing:5px;
}

.info{
    display:flex;
    gap:40px;
    padding:20px;
    font-size:26px;
}

.info b{
    color:#0d3d75;
}

.barra{
    background:black;
    color:white;
    padding:8px 15px;
    font-size:22px;
}

.titulo{
    background:linear-gradient(#0d4f8f,#1f7bcf);
    color:white;
    text-align:center;
    padding:18px;
    font-size:35px;
    font-weight:bold;
}

.tabla{
    width:95%;
    margin:30px auto;
    border-collapse:collapse;
}

.tabla th{
    background:#0d4f8f;
    color:white;
    padding:15px;
    font-size:24px;
    border:2px solid #999;
}

.tabla td{
    height:45px;
    border:2px solid #999;
}

.botones{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:30px;
}

.botones button{
    width:170px;
    padding:15px;
    border:none;
    background:linear-gradient(#003b64,#0d84d8);
    color:white;
    font-size:24px;
    border-radius:4px;
    cursor:pointer;
}

.botones button:hover{
    transform:scale(1.03);
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="top">
        S.I.A.F
    </div>

    <div class="info">
        <div><b>ENTIDAD:</b> 0025</div>
        <div>Ministerio de la Presidencia</div>
    </div>

    <div class="info" style="padding-top:0;">
        <div><b>UNIDAD:</b> 0</div>
    </div>

    <div class="barra">
        Unidad Administrativa
    </div>

    <div class="titulo">
        ADMINISTRACION UNIDAD ADMINISTRATIVA
    </div>

    <table class="tabla">
        <tr>
            <th>UNIDAD</th>
            <th>DESCRIPCION</th>
            <th>CIUDAD</th>
        </tr>
        
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
    </table>

    <div class="botones">
        <button>Nuevo</button>
        <button>Editar</button>
        <button>Eliminar</button>
        <button>Seleccionar</button>
        <button>Salir</button>
    </div>

</div>

</body>
</html>

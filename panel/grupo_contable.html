<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos_examen.css">
    <title>Grupo Contable</title>
</head>
<body>
    <div class="ventana">
        <div class="barra-negra">GRUPOS CONTABLES</div>
        <div class="header-azul">GRUPO CONTABLE</div>
        
        <div class="contenido">
            <div class="fila">
                UNIDAD: <input type="text" value="0252" style="width: 50px;"> Nivel Central
            </div>
            <div class="fila">
                Grupo: <input type="text" value="2" style="width: 30px;">
                Nombre: 
                <select style="flex-grow: 1;">
                    <option>MUEBLES Y ENSERES DE OFICINA</option>
                </select>
            </div>
            <div class="fila">
                Vida Util: <input type="text" value="10" style="width: 30px;">
                Observaciones: <input type="text" style="flex-grow: 1;">
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">CODIGO</th>
                        <th>NOMBRE AUXILIAR</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td>ACONDICIONADOR DE AIRE</td></tr>
                    <tr><td>2</td><td>ALACENA</td></tr>
                    <tr><td>3</td><td>ALFOMBRA O TAPIZ</td></tr>
                    <tr><td>4</td><td>AMPLIADORA DE FOTOGRAFIA</td></tr>
                </tbody>
            </table>
        </div>

        <div class="barra-botones">
            <button class="btn-win">Nuevo</button>
            <button class="btn-win">Modificar</button>
            <button class="btn-win">Guardar</button>
            <button class="btn-win">Eliminar</button>
            <button class="btn-win">Deshacer</button>
            <button class="btn-win">Salir</button>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/estilos_examen.css">
    <title>Seguridad</title>
</head>
<body>
    <div class="ventana">
        <div class="barra-negra">SEGURIDAD</div>
        <div class="header-azul">SEGURIDAD</div>
        
        <div class="contenido" style="background: #e2efff;">
            <div class="fila">
                USUARIO: <input type="text" value="admin">
                CONTRASEÑA ASIGNADA: <input type="password" value="*****">
            </div>
            <div class="fila">
                NOMBRE COMPLETO: <input type="text" value="administrador" style="flex-grow: 1;">
            </div>
            <div class="fila">
                DESCRIPCION: <textarea style="flex-grow: 1; background: #ffffcc;"></textarea>
            </div>
            <div class="fila">
                TIPO DE USUARIO: 
                <input type="radio" name="tipo"> Operador
                <input type="radio" name="tipo" checked> Administrador
            </div>
        </div>

        <div class="barra-botones">
            <button class="btn-win">Primero</button>
            <button class="btn-win">Anterior</button>
            <button class="btn-win">Siguiente</button>
            <button class="btn-win">Ultimo</button>
            <button class="btn-win">Nuevo</button>
            <button class="btn-win"><u>E</u>ditar</button>
            <button class="btn-win">Salir</button>
        </div>
    </div>
</body>
</html>
